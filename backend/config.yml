listeners:
  public:
    addr: :${PUBLIC_PORT:-8080}
  admin:
    addr: :${ADMIN_PORT:-9090}
observability:
  logs:
    level: ${LOG_LEVEL:-info}
  metrics:
    enabled: ${METRICS_ENABLED:-false}
defaults:
  timeouts:
    request: ${REQUEST_TIMEOUT:-30s}
    upstream_response_header: ${UPSTREAM_RESPONSE_HEADER_TIMEOUT:-30s}
  body_limit: ${BODY_LIMIT:-1MB}
shutdown:
  timeout: ${SHUTDOWN_TIMEOUT:-5s}
rate_limit:
  capacity: ${RATE_LIMIT_CAPACITY:-20}
  refill_rate_per_sec: ${RATE_LIMIT_REFILL_RATE_PER_SEC:-5}
  key_prefix: ${RATE_LIMIT_KEY_PREFIX:-rl}

redis:
  addr: ${REDIS_ADDR:-localhost:6379}
  password: ${REDIS_PASSWORD:-}
  db: ${REDIS_DB:-0}

routes:
  - id: root
    host: api.example.com
    path_prefix: /
    upstream_pool: main-pool

upstream_pools:
  - id: main-pool
    targets:
      - "http://svc-a:8081"
      - "http://svc-a:8082"
  
