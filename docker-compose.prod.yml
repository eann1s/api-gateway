services:
  app:
    image: ${BACKEND_DOCKER_IMAGE}
    env_file: .env.prod
    ports:
      - ${PUBLIC_PORT}:${PUBLIC_PORT}
    networks:
      - prod
  
  redis:
    image: redis:8.6.2-alpine
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      - prod

networks:
  prod:
    driver: bridge
    external: true
