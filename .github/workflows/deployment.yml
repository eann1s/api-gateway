name: deployment

on:
  push:
    branches: [main, master, development, develop, dev, test, stage, prod, production]
  pull_request:
    branches: [main, master, development, develop, dev, test, stage, prod, production]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: eann1s/rate-limiter

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      target_env: ${{ steps.vars.outputs.target_env }}
      compose: ${{ steps.vars.outputs.compose }}
      secret: ${{ steps.vars.outputs.secret }}
      backend_tag: ${{ steps.vars.outputs.backend_tag }}
    steps:
      - name: Derive deploy variables
        id: vars
        run: |
          case "${GITHUB_REF}" in
            refs/heads/main|refs/heads/master|refs/heads/prod|refs/heads/production)
              echo "target_env=prod" >> "$GITHUB_OUTPUT"
              echo "compose=docker-compose.prod.yml" >> "$GITHUB_OUTPUT"
              echo "secret=DOT_ENV_PROD" >> "$GITHUB_OUTPUT"
              echo "backend_tag=prod-backend" >> "$GITHUB_OUTPUT"
              ;;
            refs/heads/*)
              echo "target_env=dev" >> "$GITHUB_OUTPUT"
              echo "compose=docker-compose.dev.yml" >> "$GITHUB_OUTPUT"
              echo "secret=DOT_ENV_DEV" >> "$GITHUB_OUTPUT"
              echo "backend_tag=dev-backend" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "target_env=" >> "$GITHUB_OUTPUT"
              echo "compose=" >> "$GITHUB_OUTPUT"
              echo "secret=" >> "$GITHUB_OUTPUT"
              echo "backend_tag=" >> "$GITHUB_OUTPUT"
              ;;
          esac

  ci-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Test race
        run: go test -race -cover ./internal/...

      - name: GolangCI-Lint
        uses: golangci/golangci-lint-action@v3
        with:
          working-directory: backend
          args: --timeout=5m

  build-backend:
    runs-on: ubuntu-latest
    needs: [prepare, ci-backend]
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,suffix=-backend
            type=sha,suffix=-backend
            type=raw,value=${{ needs.prepare.outputs.backend_tag }},enable=${{ needs.prepare.outputs.backend_tag != '' }}

      - name: Compute version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and (conditionally) push
        uses: docker/build-push-action@v5
        with:
          sbom: true
          provenance: true
          context: ./backend
          file: backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            GH_PAT=${{ secrets.GH_PAT }}
            VERSION=${{ steps.ver.outputs.version }}

  deploy:
    runs-on: ubuntu-latest
    needs: [prepare, ci-backend, build-backend]
    if: github.event_name == 'push' && needs.prepare.outputs.target_env != ''
    environment: ${{ needs.prepare.outputs.target_env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create deployment environment file
        run: |
          echo "${{ secrets[needs.prepare.outputs.secret] }}" | base64 -d > ".env.${{ needs.prepare.outputs.target_env }}"
          printf '\n' >> ".env.${{ needs.prepare.outputs.target_env }}"
          echo "BACKEND_DOCKER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.backend_tag }}" >> ".env.${{ needs.prepare.outputs.target_env }}"
          chmod 644 ".env.${{ needs.prepare.outputs.target_env }}"

      - name: Transfer updated files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: ".env.${{ needs.prepare.outputs.target_env }},${{ needs.prepare.outputs.compose }}"
          target: "/home/${{ secrets.SERVER_USERNAME }}/${{ needs.prepare.outputs.target_env }}"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            env=${{ needs.prepare.outputs.target_env }}
            compose_file=${{ needs.prepare.outputs.compose }}
            env_file=".env.${env}"
            project_dir="/home/${{ secrets.SERVER_USERNAME }}/${{ needs.prepare.outputs.target_env }}"

            cd "$project_dir"

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            docker compose --env-file "$env_file" -f "$compose_file" pull
            docker compose --env-file "$env_file" -f "$compose_file" up -d
            docker compose --env-file "$env_file" -f "$compose_file" ps
